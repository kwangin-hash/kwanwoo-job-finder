# Render.com 배포 정의 (Dockerfile 이 루트에 있음)
services:
  - type: web
    name: kwanwoo-job-finder
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
      - key: TZ
        value: Asia/Seoul
    healthCheckPath: /health
